<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マレットゴルフ Ver.2.0</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f7faf8;color:#183025}
.wrap{max-width:1100px;margin:auto;padding:10px}
.card{background:#fff;border:1px solid #cbded2;border-radius:16px;padding:12px;margin-bottom:12px}
h1{color:#086336;margin:0 0 10px}
.row{display:flex;gap:8px;flex-wrap:wrap}
button{font:inherit;border:0;border-radius:12px;padding:10px 14px;font-weight:700}
.mode{background:#eef4ef}.mode.active{background:#0b6b3a;color:#fff}
.members{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.member{border:2px solid #b9cfc1;border-radius:12px;padding:8px}
.member input{width:100%;font-size:20px;border:0;border-bottom:1px solid #bbb}
.quick{display:flex;gap:6px;overflow-x:auto}
.quick button{min-width:54px;background:#fff;border:2px solid #0b6b3a;color:#0b6b3a;font-size:22px}
table{border-collapse:collapse;width:100%;min-width:720px}
th,td{border:2px solid #8eaf9b;text-align:center;padding:4px;height:46px}
th{background:#eef7f1;color:#165b38}
td.score{cursor:pointer}.filled{background:#fff8df}.birdie{color:#df2435;font-weight:800}.eagle{color:#1769d2;font-weight:800}
.tablewrap{overflow:auto}
.modal{position:fixed;inset:0;background:#0006;display:none;align-items:center;justify-content:center}.modal.open{display:flex}
.panel{background:white;padding:16px;border-radius:18px;width:min(420px,92vw)}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.keys button{height:60px;background:#fff;border:1px solid #ccc;font-size:24px}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.nav .next{background:#0b6b3a;color:white}
@media(max-width:700px){.members{grid-template-columns:repeat(2,1fr)}th,td{font-size:13px;height:40px}table{min-width:100%}}
</style>
</head>
<body>
<div class="wrap">
<section class="card">
<h1>⛳ マレットゴルフ Ver.2.0</h1>
<div class="row" id="modes"></div>
<div class="members" id="members"></div>
</section>
<section class="card">
<h3>全員同じスコア</h3>
<div class="quick" id="quick"></div>
</section>
<section class="card">
<div class="tablewrap">
<table>
<thead><tr id="head"></tr></thead>
<tbody id="body"></tbody>
<tfoot><tr id="total"></tr></tfoot>
</table>
</div>
</section>
</div>
<div class="modal" id="modal">
<div class="panel">
<h2 id="title"></h2><div id="meta"></div>
<div class="keys" id="keys"></div>
<div class="nav">
<button id="prev">前へ</button><button id="close">閉じる</button><button id="next" class="next">次へ</button>
</div>
</div>
</div>
<script>
const pars=[3,4,3,4,5,3,4,3,4,3,4,3,4,5,3,4,3,4];
let count=4,names=["岡田","石橋","中西","松本","","",""],scores=Array.from({length:18},()=>Array(7).fill(null)),cur={h:0,p:0};
const $=x=>document.getElementById(x);
function renderModes(){$("modes").innerHTML="";[4,5,6,7].forEach(n=>{let b=document.createElement("button");b.textContent=n+"人";b.className="mode"+(n===count?" active":"");b.onclick=()=>{count=n;renderAll()};$("modes").appendChild(b)})}
function renderMembers(){$("members").innerHTML="";for(let i=0;i<count;i++){let d=document.createElement("div");d.className="member";d.innerHTML=`<small>プレーヤー${i+1}</small><input value="${names[i]||""}" placeholder="名前">`;d.querySelector("input").oninput=e=>{names[i]=e.target.value;renderTable()};$("members").appendChild(d)}}
function renderQuick(){$("quick").innerHTML="";[1,2,3,4,5,6,7,8,9].forEach(n=>{let b=document.createElement("button");b.textContent=n===9?"＋":n;b.onclick=()=>fillSame(n);$("quick").appendChild(b)})}
function renderTable(){$("head").innerHTML="<th>H</th><th>Par</th>"+Array.from({length:count},(_,i)=>`<th>${names[i]||"未設定"}</th>`).join("");$("body").innerHTML="";for(let h=0;h<18;h++){let tr=document.createElement("tr");tr.innerHTML=`<td>${h+1}</td><td>${pars[h]}</td>`;for(let p=0;p<count;p++){let td=document.createElement("td");td.className="score";let v=scores[h][p];if(v!==null){td.textContent=v;td.classList.add("filled");if(v===pars[h]-1)td.classList.add("birdie");if(v<=pars[h]-2)td.classList.add("eagle")}td.onclick=()=>open(h,p);tr.appendChild(td)}$("body").appendChild(tr)}$("total").innerHTML="<td>合計</td><td>"+pars.reduce((a,b)=>a+b,0)+"</td>"+Array.from({length:count},(_,p)=>"<td>"+scores.map(r=>r[p]).filter(v=>v!==null).reduce((a,b)=>a+b,0)+"</td>").join("")}
function open(h,p){cur={h,p};$("title").textContent=`Hole ${h+1} ${names[p]||"未設定"}`;$("meta").textContent="Par "+pars[h];$("keys").innerHTML="";[1,2,3,4,5,6,7,8,9].forEach(n=>{let b=document.createElement("button");b.textContent=n===9?"＋":n;b.onclick=()=>setScore(n===9?9:n,n!==9);$("keys").appendChild(b)});$("modal").classList.add("open")}
function setScore(v,move){scores[cur.h][cur.p]=v;renderTable();if(move)moveCur(1)}
function moveCur(step){let i=cur.h*count+cur.p+step;if(i<0)i=0;if(i>=18*count){$("modal").classList.remove("open");return}open(Math.floor(i/count),i%count)}
function fillSame(v){for(let p=0;p<count;p++)scores[cur.h][p]=v;renderTable()}
$("prev").onclick=()=>moveCur(-1);$("next").onclick=()=>moveCur(1);$("close").onclick=()=>$("modal").classList.remove("open");
function renderAll(){renderModes();renderMembers();renderQuick();renderTable()}
renderAll();
</script>
</body></html>
